name: Stargaze Alerts

on:
  schedule:
    # 14 UTC = 7am Pacific (PDT). One check per day; seen.json prevents repeats.
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python check_stargaze.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      - name: Commit seen.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --cached --quiet || (git commit -m "Update stargaze alert state" && git push)
